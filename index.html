function buildStackScene() {
  clearGroup(stackGroup);
  stackLayerMeshes = [];
  stackPlatformMeshes = [];

  const centers = stackLayerCenters();
  const n = data.requests.length;

  for (let li = 0; li < STACK_ORDER.length; li++) {
    const layerId = STACK_ORDER[li];
    const c = centers[li];
    const platform = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 0.14, 2.2),
      new THREE.MeshStandardMaterial({
        color: STACK_COLORS[layerId],
        emissive: STACK_COLORS[layerId],
        emissiveIntensity: 0.12,
        metalness: 0.35,
        roughness: 0.45,
        transparent: true,
        opacity: 0.35,
      }),
    );
    platform.position.set(c[0], c[1] - 0.12, c[2]);
    platform.userData.layerIdx = li;
    stackPlatformMeshes.push(platform);
    stackGroup.add(platform);

    const geo = new THREE.SphereGeometry(0.009, 7, 7);
    const mat = new THREE.MeshStandardMaterial({
      color: STACK_COLORS[layerId],
      emissive: STACK_COLORS[layerId],
      emissiveIntensity: 0.35,
      metalness: 0.25,
      roughness: 0.4,
    });
    const mesh = new THREE.InstancedMesh(geo, mat, n);
    mesh.frustumCulled = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    stackLayerMeshes.push(mesh);
    stackGroup.add(mesh);
  }

  const links = data.hardware?.links || [
    { from: 'network', to: 'storage' }, { from: 'network', to: 'kv_cache' },
    { from: 'storage', to: 'kv_cache' }, { from: 'kv_cache', to: 'gpu' },
    { from: 'gpu', to: 'hbm' }, { from: 'storage', to: 'gpu' },
  ];
  const busPos = new Float32Array(links.length * 6);
  const busCol = new Float32Array(links.length * 6);
  const idxOf = Object.fromEntries(STACK_ORDER.map((id, i) => [id, i]));
  let bi = 0;
  for (const link of links) {
    const a = centers[idxOf[link.from]], b = centers[idxOf[link.to]];
    color.setHex(STACK_COLORS[link.from] || 0xffffff);
    busPos[bi] = a[0]; busPos[bi + 1] = a[1]; busPos[bi + 2] = a[2];
    busCol[bi] = color.r * 0.5; busCol[bi + 1] = color.g * 0.5; busCol[bi + 2] = color.b * 0.5; bi += 3;
    color.setHex(STACK_COLORS[link.to] || 0xffffff);
    busPos[bi] = b[0]; busPos[bi + 1] = b[1]; busPos[bi + 2] = b[2];
    busCol[bi] = color.r * 0.7; busCol[bi + 1] = color.g * 0.7; busCol[bi + 2] = color.b * 0.7; bi += 3;
  }
  const busGeom = new THREE.BufferGeometry();
  busGeom.setAttribute('position', new THREE.BufferAttribute(busPos, 3));
  busGeom.setAttribute('color', new THREE.BufferAttribute(busCol, 3));
  stackBusLines = new THREE.LineSegments(busGeom, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.55 }));
  stackBusLines.frustumCulled = false;
  stackGroup.add(stackBusLines);

  const segsPerReq = STACK_ORDER.length - 1;
  stackFlowGeom = new THREE.BufferGeometry();
  stackFlowGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(n * segsPerReq * 6), 3).setUsage(THREE.DynamicDrawUsage));
  stackFlowGeom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(n * segsPerReq * 6), 3).setUsage(THREE.DynamicDrawUsage));
  stackFlowLines = new THREE.LineSegments(stackFlowGeom, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.48 }));
  stackFlowLines.frustumCulled = false;
  stackGroup.add(stackFlowLines);

  stackMetricMeshes = createMetricInstancedLayers(stackGroup, n, layersForView('stack'), 0.007);

  controls.target.set(0, 1.0, 0);
  camera.position.set(4.2, 2.8, 4.8);
}

function updateStack(frame) {
  if (!stackLayerMeshes.length || !frame) return 0;
  const tMs = frame.tMs ?? 0;
  const breathPulse = 0.86 + 0.16 * (frame.breath ?? 1);
  const minSize = 0.22, maxSize = 1.85;
  let activeCount = 0;
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0045);

  for (let li = 0; li < stackPlatformMeshes.length; li++) {
    const stress = frame.layer_stress?.[li] ?? 1;
    const mesh = stackPlatformMeshes[li];
    mesh.scale.set(0.92 + 0.22 * stress, 1, 0.92 + 0.18 * stress);
    mesh.material.emissiveIntensity = 0.1 + 0.22 * Math.min(stress, 2.2);
    mesh.material.opacity = 0.28 + 0.14 * breathPulse;
  }

  for (let i = 0; i < data.requests.length; i++) {
    const req = data.requests[i];
    const life = requestLife(req, tMs);
    let size = minSize + req.size * (maxSize - minSize);

    if (life.phase === 'pending') { size *= 0.45; }
    else if (life.phase === 'done') { size *= 0.72; }
    else { activeCount++; size *= 1.1 + 0.25 * Math.sin(life.progress * Math.PI) + 0.1 * pulse; }

    for (let li = 0; li < STACK_ORDER.length; li++) {
      const pos = stackLayerPosition(req, li, i, tMs, frame);
      dummy.position.copy(pos);
      dummy.scale.setScalar(size * (0.85 + 0.3 * deriveHardware(req)[STACK_ORDER[li]]));
      dummy.updateMatrix();
      stackLayerMeshes[li].setMatrixAt(i, dummy.matrix);
    }
  }

  for (const mesh of stackLayerMeshes) mesh.instanceMatrix.needsUpdate = true;

  if (stackMetricMeshes.length) {
    paintMetricInstances(stackMetricMeshes, {
      tMs,
      minSize: 0.18,
      maxSize: 1.35,
      span: 0.75,
      getPos: i => {
        const pos = stackLayerPosition(data.requests[i], 3, i, tMs, frame);
        return [pos.x, pos.y, pos.z];
      },
    });
  }

  const posAttr = stackFlowGeom.attributes.position;
  const colAttr = stackFlowGeom.attributes.color;
  let vi = 0;
  for (let i = 0; i < data.requests.length; i++) {
    const req = data.requests[i];
    const life = requestLife(req, tMs);
    const alpha = life.phase === 'pending' ? 0.08 : life.phase === 'done' ? 0.22 : 0.72;
    for (let li = 0; li < STACK_ORDER.length - 1; li++) {
      const a = stackLayerPosition(req, li, i, tMs, frame);
      const ax = a.x, ay = a.y, az = a.z;
      const b = stackLayerPosition(req, li + 1, i, tMs, frame);
      color.setHex(STACK_COLORS[STACK_ORDER[li + 1]]);
      const dim = alpha * (0.45 + 0.55 * deriveHardware(req)[STACK_ORDER[li + 1]]);
      posAttr.setXYZ(vi, ax, ay, az); colAttr.setXYZ(vi, color.r * dim, color.g * dim, color.b * dim); vi++;
      posAttr.setXYZ(vi, b.x, b.y, b.z); colAttr.setXYZ(vi, color.r * dim, color.g * dim, color.b * dim); vi++;
    }
  }
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
  return activeCount;
}

function ensureTopoBuffers(frame) {
  const pf = frame.positions_flat;
  if (!pf?.length) return false;
  if (!topoTargetPos || topoTargetPos.length !== pf.length) {
    topoTargetPos = new Float32Array(pf);
    topoSmoothPos = new Float32Array(pf);
  } else {
    topoTargetPos.set(pf);
  }
  const sf = frame.street_flat;
  if (sf?.length) {
    if (!topoTargetStreets || topoTargetStreets.length !== sf.length) {
      topoTargetStreets = new Float32Array(sf);
      topoSmoothStreets = new Float32Array(sf);
    } else {
      topoTargetStreets.set(sf);
    }
  }
  return true;
}

function stepTopologyFluid(strength = 0.16) {
  if (!topoTargetPos || !topoSmoothPos) return;
  for (let i = 0; i < topoSmoothPos.length; i++) {
    topoSmoothPos[i] += (topoTargetPos[i] - topoSmoothPos[i]) * strength;
  }
  if (topoTargetStreets && topoSmoothStreets) {
    for (let i = 0; i < topoSmoothStreets.length; i++) {
      topoSmoothStreets[i] += (topoTargetStreets[i] - topoSmoothStreets[i]) * strength * 1.15;
    }
  }
}

function updateStreetLines() {
  if (!topoSmoothStreets) return;
  const meta = data.topology?.street_meta || { streets: streetLines.length, points_per_street: 36 };
  const pts = meta.points_per_street;
  for (let si = 0; si < streetLines.length; si++) {
    const line = streetLines[si];
    const attr = line.geometry.attributes.position;
    const base = si * pts * 3;
    for (let pi = 0; pi < pts; pi++) {
      const j = base + pi * 3;
      attr.setXYZ(pi, topoSmoothStreets[j], topoSmoothStreets[j + 1], topoSmoothStreets[j + 2]);
    }
    attr.needsUpdate = true;
    const breath = 1 + 0.08 * Math.sin(performance.now() * 0.001 + si);
    line.material.opacity = (si === meta.streets - 1 ? 0.18 : 0.34 + 0.12 * breath) * Math.min(data.topology?._lastBreath ?? 1.4, 1.6);
  }
}

function paintTopologyNodes(frame) {
  if (!topoMetricMeshes.length || !topoSmoothPos) return 0;
  const tMs = frame.tMs ?? 0;
  const pf = topoSmoothPos;
  let activeCount = 0;
  for (const req of data.requests) {
    if (requestLife(req, tMs).phase === 'active') activeCount++;
  }

  const ext = topologyExtent();
  const span = Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4], 0.5);
  paintMetricInstances(topoMetricMeshes, {
    tMs,
    minSize: 0.24,
    maxSize: 2.1,
    span: span * 0.04,
    getPos: i => [pf[i * 3], pf[i * 3 + 1], pf[i * 3 + 2]],
  });

  const posAttr = topoEdgeGeom.attributes.position;
  const colAttr = topoEdgeGeom.attributes.color;
  let vi = 0;
  for (const e of data.edges) {
    const pu = e.u * 3, pv = e.v * 3;
    const reqU = data.requests[e.u], reqV = data.requests[e.v];
    const edgeActive = tMs >= reqU.start_ms && tMs <= reqV.end_ms;
    const dim = (edgeActive ? 0.72 : 0.24) * (e.type === 'cache' ? 0.55 : 0.75);
    posAttr.setXYZ(vi, pf[pu], pf[pu + 1], pf[pu + 2]);
    colAttr.setXYZ(vi, EDGE_NEUTRAL[0] * dim, EDGE_NEUTRAL[1] * dim, EDGE_NEUTRAL[2] * dim); vi++;
    posAttr.setXYZ(vi, pf[pv], pf[pv + 1], pf[pv + 2]);
    colAttr.setXYZ(vi, EDGE_NEUTRAL[0] * dim, EDGE_NEUTRAL[1] * dim, EDGE_NEUTRAL[2] * dim); vi++;
  }
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
  return activeCount;
}

function updateFabric(frame) {
  if (!fabricMetricMeshes.length) return;
  const pf = frame.positions_flat;
  const tMs = frame.tMs ?? 0;
  const ext = data.meta.extent;
  const span = Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4], 0.5);

  paintMetricInstances(fabricMetricMeshes, {
    tMs,
    minSize: 0.3,
    maxSize: 2.5,
    span: span * 0.035,
    getPos: i => [pf[i * 3], pf[i * 3 + 1], pf[i * 3 + 2]],
  });

  const posAttr = fabricEdgeGeom.attributes.position;
  const colAttr = fabricEdgeGeom.attributes.color;
  let vi = 0;
  for (const e of data.edges) {
    const pu = e.u * 3, pv = e.v * 3;
    const dim = e.type === 'cache' ? 0.38 : 0.62;
    posAttr.setXYZ(vi, pf[pu], pf[pu + 1], pf[pu + 2]);
    colAttr.setXYZ(vi, EDGE_NEUTRAL[0] * dim, EDGE_NEUTRAL[1] * dim, EDGE_NEUTRAL[2] * dim); vi++;
    posAttr.setXYZ(vi, pf[pv], pf[pv + 1], pf[pv + 2]);
    colAttr.setXYZ(vi, EDGE_NEUTRAL[0] * dim, EDGE_NEUTRAL[1] * dim, EDGE_NEUTRAL[2] * dim); vi++;
  }
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

function updateTopology(frame) {
  if (!topoMetricMeshes.length || !frame || !ensureTopoBuffers(frame)) return;
  data.topology._lastBreath = frame.breath ?? 1;
  const breathPulse = 0.88 + 0.14 * (frame.breath ?? 1);

  if (frame.hubs_flat) {
    for (let i = 0; i < hubMeshes.length; i++) {
      const mesh = hubMeshes[i];
      mesh.position.set(frame.hubs_flat[i * 3], frame.hubs_flat[i * 3 + 1], frame.hubs_flat[i * 3 + 2]);
      const stress = frame.hub_stress?.[i] ?? 1;
      mesh.scale.setScalar((0.8 + 0.5 * Math.min(stress, 2.3)) * breathPulse);
    }
  }

  stepTopologyFluid(playing ? 0.14 : 0.24);
  updateStreetLines();
  frame._activeReplay = paintTopologyNodes(frame);
}

function updateDims() {
  const el = document.getElementById('dims');
  if (activeView === 'fabric') {
    el.innerHTML = `
      <div><span style="color:#e8814a">X</span> schedule time</div>
      <div><span style="color:#6fa8e8">Y</span> KV prefix family</div>
      <div><span style="color:#9fd4a8">Z</span> context depth</div>
      <div><span style="color:#ffb46e">Beads</span> 7 metrics orbit each node</div>`;
  } else if (activeView === 'stack') {
    el.innerHTML = `
      <div><span style="color:#e8814a">Layout</span> hardware stack + interconnect buses</div>
      <div><span style="color:#6fa8e8">Spread</span> schedule · input length · token volume</div>
      <div><span style="color:#9fd4a8">Motion</span> blended metric flow along the data path</div>
      <div><span style="color:#ffb46e">Beads</span> 7 metrics at GPU layer per request</div>`;
  } else if (activeView === 'scatter') {
    el.innerHTML = `
      <div><span style="color:#e8814a">X</span> schedule time</div>
      <div><span style="color:#6fa8e8">Y</span> stacked metric heights</div>
      <div><span style="color:#9fd4a8">Z</span> input context depth (log)</div>
      <div><span style="color:#ffb46e">Beads</span> all 7 metrics orbit each request</div>`;
  } else if (activeView === 'surface') {
    el.innerHTML = `
      <div><span style="color:#e8814a">X</span> schedule time</div>
      <div><span style="color:#6fa8e8">Z</span> KV prefix family lane</div>
      <div><span style="color:#9fd4a8">Y</span> peak enabled metric per cell</div>
      <div><span style="color:#ffb46e">Color</span> dominant metric · toggle in legend</div>`;
  } else if (activeView === 'feast') {
    el.innerHTML = `
      <div><span style="color:#e8814a">Nodes</span> workloads + GPU / memory / storage / bandwidth hubs</div>
      <div><span style="color:#6fa8e8">Springs</span> KV prefix reuse pulls · contention repels</div>
      <div><span style="color:#9fd4a8">Allocation</span> slide right for optimized harmony (DDN-style)</div>
      <div><span style="color:#ffb46e">Beads</span> all 7 metrics orbit each workload</div>`;
  } else {
    el.innerHTML = `
      <div><span style="color:#e8814a">Flow</span> schedule bends through a warped street manifold</div>
      <div><span style="color:#6fa8e8">Lanes</span> Network · Storage · CPU · GPU avenues</div>
      <div><span style="color:#9fd4a8">Motion</span> elastic stretch + breath under active load</div>
      <div><span style="color:#ffb46e">Beads</span> all 7 metrics orbit each request</div>`;
  }
  updateHubsPanel();
}

function setView(view) {
  activeView = view;
  document.getElementById('btnFabric').classList.toggle('active', view === 'fabric');
  document.getElementById('btnTopology').classList.toggle('active', view === 'topology');
  document.getElementById('btnStack').classList.toggle('active', view === 'stack');
  document.getElementById('btnScatter').classList.toggle('active', view === 'scatter');
  document.getElementById('btnSurface').classList.toggle('active', view === 'surface');
  document.getElementById('btnFeast').classList.toggle('active', view === 'feast');
  fabricGroup.visible = view === 'fabric';
  topologyGroup.visible = view === 'topology';
  stackGroup.visible = view === 'stack';
  scatterGroup.visible = view === 'scatter';
  surfaceGroup.visible = view === 'surface';
  feastGroup.visible = view === 'feast';
  document.getElementById('feastHud').classList.toggle('visible', view === 'feast');
  document.getElementById('optimizeRow').classList.toggle('visible', view === 'feast');
  if (view === 'stack') {
    controls.target.set(0, 1.0, 0);
    camera.position.set(4.2, 2.8, 4.8);
    controls.update();
  } else if (view === 'topology') {
    const ext = topologyExtent();
    const cx = (ext[0] + ext[1]) / 2, cy = (ext[2] + ext[3]) / 2, cz = (ext[4] + ext[5]) / 2;
    const span = Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4]);
    controls.target.set(cx, cy, cz);
    camera.position.set(cx + span * 0.62, cy + span * 0.48, cz + span * 0.92);
    controls.update();
  } else if (view === 'scatter') {
    controls.target.set(0, 0, 0);
    camera.position.set(2.4, 1.9, 2.6);
    controls.update();
  } else if (view === 'surface') {
    controls.target.set(0, 0.35, 0);
    camera.position.set(2.9, 2.3, 2.9);
    controls.update();
  } else if (view === 'feast' && feastBaseCamera) {
    controls.target.set(feastBaseCamera.tx, feastBaseCamera.ty, feastBaseCamera.tz);
    camera.position.set(feastBaseCamera.px, feastBaseCamera.py, feastBaseCamera.pz);
    controls.update();
  } else if (data) {
    const ext = data.meta.extent;
    const cx = (ext[0]+ext[1])/2, cy = (ext[2]+ext[3])/2, cz = (ext[4]+ext[5])/2;
    const span = Math.max(ext[1]-ext[0], ext[3]-ext[2], ext[5]-ext[4]);
    controls.target.set(cx, cy, cz);
    camera.position.set(cx + span*0.55, cy + span*0.42, cz + span*0.85);
    controls.update();
  }
  bloomPass.strength = view === 'feast'
    ? 0.32 + 0.28 * feastChaos()
    : view === 'stack' ? 0.42
    : view === 'topology' ? 0.38
    : view === 'scatter' ? 0.28
    : view === 'surface' ? 0.32
    : 0.22;
  bloomPass.radius = view === 'feast'
    ? 0.48 + 0.12 * feastChaos()
    : view === 'stack' ? 0.55
    : view === 'topology' ? 0.52
    : view === 'scatter' ? 0.48
    : view === 'surface' ? 0.5
    : 0.45;
  syncAllMetricVisibility();
  buildMetricLegend();
  hideTooltip();
  updateDims();
  updateFrame();
}

function updateFrame() {
  if (!data) return;
  const tMs = tNorm * data.meta.duration_ms;
  const fabricFrame = sampleFabricWindow(tMs);
  const topoFrame = sampleTopologyWindow(tMs, fabricFrame);
  const stackFrame = sampleHardwareWindow(tMs);
  const dashFrame = sampleDashboardWindow(tMs);

  if (activeView === 'fabric' && fabricFrame) updateFabric(fabricFrame);
  if (activeView === 'topology' && topoFrame) updateTopology(topoFrame);
  if (activeView === 'stack' && stackFrame) stackFrame._activeReplay = updateStack(stackFrame);
  if (activeView === 'scatter' && fabricFrame) fabricFrame._activeReplay = updateScatter(fabricFrame);
  if (activeView === 'surface' && fabricFrame) fabricFrame._activeReplay = updateSurface(fabricFrame);
  if (activeView === 'feast' && fabricFrame && stackFrame) {
    fabricFrame._activeReplay = updateFeast({ ...fabricFrame, layer_stress: stackFrame.layer_stress });
  }
  if (dashFrame) updateDashboard(dashFrame);

  const frame = activeView === 'fabric' ? fabricFrame
    : activeView === 'stack' ? stackFrame
    : activeView === 'scatter' || activeView === 'surface' || activeView === 'feast' ? fabricFrame
    : topoFrame;
  if (frame) {
    document.getElementById('tlabel').textContent = formatTime(tMs);
    const activeText = frame._activeReplay != null
      ? `${frame._activeReplay} in-flight · ${frame.active_requests} window-active`
      : `${frame.active_requests} active`;
    document.getElementById('activeLabel').textContent =
      `${activeText} · breath ${frame.breath.toFixed(2)}× · ${data.requests.length.toLocaleString()} nodes`;
  }
}

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
let bloomPass = new UnrealBloomPass(new THREE.Vector2(1,1), 0.22, 0.45, 0.82);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

scene.add(new THREE.AmbientLight(0x405068, 0.95));
const key = new THREE.DirectionalLight(0xe8eef6, 1.05);
key.position.set(4, 6, 5);
scene.add(key);

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  updateFrame();
}

function setData(payload) {
  if (!payload.topology || !payload.hardware) {
    alert('This layout is missing topology/hardware sections. Re-export with the latest export_mooncake_trace_layout.py');
    return;
  }
  data = payload;
  nPrefixLanes = payload.meta.n_prefix_lanes
    || new Set(payload.requests.map(r => r.prefix_lane)).size
    || 1;
  document.getElementById('load').classList.add('hidden');
  document.getElementById('title').textContent = payload.meta.title || 'Trace explorer';
  document.getElementById('subtitle').textContent =
    `${payload.meta.n_requests.toLocaleString()} requests · ${payload.meta.duration_s.toLocaleString()}s · Fabric · Streets · Stack · Scatter · Surface · Feast`;
  initDashboard();
  document.getElementById('dashboard').classList.add('visible');
  buildFabricScene();
  buildTopologyScene();
  buildStackScene();
  buildScatterScene();
  buildSurfaceScene();
  buildFeastScene();
  setView(activeView);
  tNorm = 0;
}

function traceById(id) {
  return TRACE_CATALOG.find(t => t.id === id);
}

function traceByFile(file) {
  return TRACE_CATALOG.find(t => t.file === file);
}

function populateTracePicker() {
  const sel = document.getElementById('tracePick');
  sel.innerHTML = TRACE_CATALOG.map(t =>
    `<option value="${t.id}">${t.label}</option>`
  ).join('');
}

function syncTraceUrl(file) {
  const url = new URL(location.href);
  url.searchParams.set('data', file);
  history.replaceState(null, '', url);
}

function setTracePickerValue(traceId) {
  const sel = document.getElementById('tracePick');
  if (traceById(traceId)) sel.value = traceId;
}

const LEGACY_TRACE_IDS = {
  toolagent: 'mooncake-toolagent',
  conversation: 'mooncake-conversation',
  synthetic: 'mooncake-synthetic',
};

function resolveInitialTraceId(dataParam) {
  if (dataParam) {
    const match = traceByFile(dataParam);
    if (match) return match.id;
    return null;
  }
  try {
    const stored = localStorage.getItem(TRACE_STORAGE_KEY);
    const migrated = LEGACY_TRACE_IDS[stored] || stored;
    if (migrated && traceById(migrated)) return migrated;
  } catch (_) { /* private browsing */ }
  return DEFAULT_TRACE_ID;
}

async function loadFromUrl(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
  setData(await res.json());
}

async function loadTrace(traceId, { persist = true, updateUrl = true } = {}) {
  const entry = traceById(traceId);
  if (!entry || traceLoading) return;
  traceLoading = true;
  playing = false;
  document.getElementById('play').textContent = '▶';
  document.getElementById('load').classList.remove('hidden');
  document.getElementById('tracePick').disabled = true;
  const subtitle = document.getElementById('subtitle');
  const prevSubtitle = subtitle.textContent;
  subtitle.textContent = `Loading ${entry.label} trace…`;

  try {
    await loadFromUrl(entry.file);
    currentTraceId = traceId;
    setTracePickerValue(traceId);
    if (persist) {
      try { localStorage.setItem(TRACE_STORAGE_KEY, traceId); } catch (_) { /* ignore */ }
    }
    if (updateUrl) syncTraceUrl(entry.file);
  } catch (err) {
    document.getElementById('load').classList.add('hidden');
    subtitle.textContent = err.message || prevSubtitle;
  } finally {
    document.getElementById('tracePick').disabled = false;
    traceLoading = false;
  }
}

function tick(now) {
  if (playing && data) {
    const speed = Math.pow(10, parseFloat(document.getElementById('speed').value));
    tNorm += ((now - lastFrame) / 1000 * speed) / Math.max(data.meta.duration_ms / 1000, 1);
    if (tNorm >= 1) tNorm -= 1;
    document.getElementById('time').value = tNorm;
    updateFrame();
  } else if (data && dashInitialized) {
    const dashFrame = sampleDashboardWindow(tNorm * data.meta.duration_ms);
    if (dashFrame) updateDashboard(dashFrame);
  }
  if (!playing && data) {
    if (activeView === 'stack' && stackLayerMeshes.length) {
      const frame = sampleHardwareWindow(tNorm * data.meta.duration_ms);
      if (frame) updateStack(frame);
    } else if (activeView === 'topology' && topoTargetPos) {
      stepTopologyFluid(0.1);
      updateStreetLines();
      paintTopologyNodes({ tMs: tNorm * data.meta.duration_ms, breath: data.topology?._lastBreath ?? 1 });
    } else if (activeView === 'scatter' && scatterMetricMeshes.length) {
      updateScatter(sampleFabricWindow(tNorm * data.meta.duration_ms));
    } else if (activeView === 'surface' && surfaceGeom) {
      updateSurface(sampleFabricWindow(tNorm * data.meta.duration_ms));
    }
  }
  if (lastHoverCtx?.kind === 'request') refreshHoverTooltip();
  lastFrame = now;
  controls.update();
  composer.render();
  requestAnimationFrame(tick);
}

document.getElementById('btnFabric').addEventListener('click', () => setView('fabric'));
document.getElementById('btnTopology').addEventListener('click', () => setView('topology'));
document.getElementById('btnStack').addEventListener('click', () => setView('stack'));
document.getElementById('btnScatter').addEventListener('click', () => setView('scatter'));
document.getElementById('btnSurface').addEventListener('click', () => setView('surface'));
document.getElementById('btnFeast').addEventListener('click', () => setView('feast'));
document.getElementById('optimizeLevel').addEventListener('input', e => {
  feastOptimize = +e.target.value;
  const lab = document.getElementById('optimizelab');
  lab.textContent = feastOptimize >= 0.72 ? 'harmony' : feastOptimize >= 0.4 ? 'balance' : 'chaos';
  if (activeView === 'feast') {
    bloomPass.strength = 0.32 + 0.28 * feastChaos();
    updateFrame();
  }
});
document.getElementById('play').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('play').textContent = playing ? '⏸' : '▶';
  if (!playing) {
    lastFeastStep = performance.now();
    feastCameraShake = 0;
    feastGroup.position.set(0, 0, 0);
    if (activeView === 'feast') updateFrame();
  }
});
document.getElementById('time').addEventListener('input', e => { tNorm = +e.target.value; updateFrame(); });
function formatSpeedLabel(sliderValue) {
  const speed = Math.pow(10, +sliderValue);
  if (speed >= 100) return `${Math.round(speed)}×`;
  if (speed >= 10) return `${speed.toFixed(1)}×`;
  return `${speed.toFixed(2)}×`;
}

document.getElementById('speed').addEventListener('input', e => {
  document.getElementById('speedlab').textContent = formatSpeedLabel(e.target.value);
});
document.getElementById('tracePick').addEventListener('change', e => { loadTrace(e.target.value); });
document.getElementById('file').addEventListener('change', async e => {
  const file = e.target.files?.[0];
  if (!file) return;
  currentTraceId = null;
  try { localStorage.removeItem(TRACE_STORAGE_KEY); } catch (_) { /* ignore */ }
  hideTooltip();
  setData(JSON.parse(await file.text()));
});

canvas.addEventListener('pointermove', e => {
  pointerClient.x = e.clientX;
  pointerClient.y = e.clientY;
  pointerToNdc(e.clientX, e.clientY);
  scheduleHoverPick();
});
canvas.addEventListener('pointerleave', hideTooltip);

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(tick);

loadMetricEnabled();
buildMetricLegend();
populateTracePicker();

const params = new URLSearchParams(location.search);
const viewParam = params.get('view');
if (viewParam === 'topology') activeView = 'topology';
if (viewParam === 'stack') activeView = 'stack';
if (viewParam === 'scatter') activeView = 'scatter';
if (viewParam === 'surface') activeView = 'surface';
if (viewParam === 'feast') activeView = 'feast';

const dataUrl = params.get('data');
const initialTraceId = resolveInitialTraceId(dataUrl);
if (dataUrl && !traceByFile(dataUrl)) {
  loadFromUrl(dataUrl).catch(err => { document.getElementById('subtitle').textContent = err.message; });
} else if (initialTraceId) {
  loadTrace(initialTraceId, { persist: true, updateUrl: !dataUrl });
} else {
  loadTrace(DEFAULT_TRACE_ID);
}
</script>
