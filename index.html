<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Trace Explorer</title>
<style>
  html, body { margin: 0; height: 100%; background: #05070c; overflow: hidden;
               font: 13px/1.4 -apple-system, "SF Mono", Menlo, sans-serif; color: #9fb2c8; }
  #c { display: block; width: 100%; height: 100%; }
  #views { position: fixed; left: 16px; top: 14px; display: flex; flex-wrap: wrap; gap: 8px;
            max-width: 520px; z-index: 5; }
  #views button { border-radius: 8px; border: 1px solid #2a3a4f; background: #14202e; color: #9fb2c8;

  #views button.active { color: #e8eef6; border-color: #e8814a; background: #1c2a3c; }
  #hud { position: fixed; left: 16px; top: 58px; user-select: none; pointer-events: none; max-width: 640px; }
  #hud h1 { font-size: 15px; font-weight: 600; color: #e8eef6; margin: 0 0 4px; }
  #hud .sub { font-size: 11.5px; color: #6e8096; line-height: 1.45; }
  #traceRow { pointer-events: auto; display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  #traceRow .lab { font-size: 11px; color: #6e8096; }
  #tracePick { min-width: 168px; max-width: 240px; background: #14202e; color: #e8eef6;
               border: 1px solid #2a3a4f; border-radius: 6px; padding: 5px 8px; font: 12px Menlo, monospace; }
  #clock { position: fixed; right: 20px; top: 16px; text-align: right; user-select: none; }
  #clock .t { font-size: 28px; font-weight: 700; color: #e8eef6; font-variant-numeric: tabular-nums; }
  #clock .sub { font-size: 11px; color: #6e8096; margin-top: 2px; }
  #panel { position: fixed; left: 16px; bottom: 16px; right: 16px; background: rgba(8,12,19,.88);
           border: 1px solid #1d2735; border-radius: 10px; padding: 10px 16px;
           backdrop-filter: blur(6px); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; z-index: 5; }
  #play { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #2a3a4f;
          background: #14202e; color: #e8eef6; font-size: 14px; cursor: pointer; }
  #time { flex: 1; min-width: 200px; accent-color: #e8814a; }
  #panel .lab { font-size: 11px; color: #6e8096; white-space: nowrap; }
  #panel select { background: #14202e; color: #e8eef6; border: 1px solid #2a3a4f; border-radius: 6px; padding: 4px 8px; }
  #dashboard { position: fixed; right: 16px; top: 72px; width: 352px; display: none;
               background: rgba(8,12,19,.9); border: 1px solid #1d2735; border-radius: 12px;
               padding: 12px 14px 10px; backdrop-filter: blur(8px); z-index: 6;
               user-select: none; pointer-events: none; }
  #dashboard.visible { display: block; }
  #dashboard .dash-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  #dashboard .dash-hdr span:first-child { font-size: 12px; font-weight: 600; color: #e8eef6; letter-spacing: .03em; }
  #dashboard .dash-source { font-size: 10px; color: #6e8096; }
  #dashboard .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  #dashboard .metric-card { background: rgba(12,18,28,.82); border: 1px solid #1a2838; border-radius: 10px;
                            padding: 8px 8px 7px; text-align: center; min-height: 88px; }
  #dashboard .metric-card.wide { grid-column: span 3; display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 8px; }
  #dashboard .metric-card.wide .stat { text-align: center; }
  #dashboard .dial { width: 54px; height: 30px; display: block; margin: 0 auto 4px; }
  #dashboard .dial-bg { fill: none; stroke: #1a2838; stroke-width: 4; stroke-linecap: round; }
  #dashboard .dial-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray .25s ease; }
  #dashboard .val { font-size: 17px; font-weight: 700; color: #e8eef6; font-variant-numeric: tabular-nums; line-height: 1.1; }
  #dashboard .val.sub { font-size: 13px; font-weight: 600; color: #b8c5d6; }
  #dashboard .lbl { font-size: 9.5px; color: #6e8096; margin-top: 3px; letter-spacing: .02em; }
  #dashboard .p90 { font-size: 9px; color: #556575; margin-top: 2px; }
  #legend { position: fixed; left: 16px; bottom: 92px; background: rgba(8,12,19,.88);
            border: 1px solid #1d2735; border-radius: 10px; padding: 10px 14px; min-width: 196px; max-width: 220px;
            z-index: 5; pointer-events: auto; user-select: none; }
  #legend .title { font-size: 11px; font-weight: 600; color: #e8eef6; margin-bottom: 8px; letter-spacing: .03em; }
  #legend .items { display: flex; flex-direction: column; gap: 5px; }
  #legend .item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 11px; color: #b8c5d6; }
  #legend .item.off { opacity: 0.35; }
  #legend .item input { accent-color: #e8814a; cursor: pointer; margin: 0; }
  #legend .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; box-shadow: 0 0 6px rgba(0,0,0,.35); }
  #dims { position: fixed; left: 16px; top: 138px; background: rgba(8,12,19,.78);
          border: 1px solid #1d2735; border-radius: 10px; padding: 8px 12px; font-size: 11px; line-height: 1.55; z-index: 4; }
  #hubs { position: fixed; right: 16px; top: 500px; background: rgba(8,12,19,.78);

  #tooltip.visible { display: block; }
  #tooltip .tip-hdr { font-weight: 600; color: #e8eef6; margin-bottom: 2px; font-size: 12px; }
  #tooltip .tip-sub { color: #6e8096; font-size: 10px; margin-bottom: 8px; }
  #tooltip .tip-rows { display: flex; flex-direction: column; gap: 3px; }
  #tooltip .tip-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
  #tooltip .tip-row .k { color: #6e8096; display: flex; align-items: center; }
  #tooltip .tip-row .v { color: #e8eef6; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  #tooltip .tip-row.hi .k, #tooltip .tip-row.hi .v { color: #e8eef6; }
  #tooltip .tip-row.hi { background: rgba(232,129,74,.12); border-radius: 4px; padding: 1px 4px; margin: 0 -4px; }
  #tooltip .tip-sw { width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; flex-shrink: 0; }

  <button id="btnSurface">Surface</button>
  <button id="btnFeast">Feast</button>

  <div class="sub" id="subtitle">Fabric · Streets · Stack · Scatter · Surface · Feast</div>

</div>

<div id="hubs"></div>

];

function clearGroup(group) {
  while (group.children.length) {
    const child = group.children[0];
    group.remove(child);
    child.geometry?.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  }
}

function ratioColor(r, out) {
  const rr = Math.max(0.2, Math.min(2.5, 1 + Math.log10(Math.max(1e-6, r))));
  const stops = [
    [0.30, [1.00, 0.22, 0.13]], [0.52, [1.00, 0.45, 0.20]],
    [0.74, [1.00, 0.72, 0.45]], [0.92, [0.62, 0.66, 0.72]], [1.00, [0.45, 0.66, 0.90]],
  ];
  if (rr <= stops[0][0]) { const c = stops[0][1]; out[0]=c[0]; out[1]=c[1]; out[2]=c[2]; return; }
  for (let i = 1; i < stops.length; i++) {
    if (rr <= stops[i][0]) {
      const [v0,c0]=stops[i-1], [v1,c1]=stops[i];
      const t = (rr-v0)/(v1-v0);
      out[0]=c0[0]+(c1[0]-c0[0])*t; out[1]=c0[1]+(c1[1]-c0[1])*t; out[2]=c0[2]+(c1[2]-c0[2])*t;
      return;
    }
  }
  const c = stops.at(-1)[1]; out[0]=c[0]; out[1]=c[1]; out[2]=c[2];
}

function metricValue(req, mode) {
  if (mode === 'input_length') return req.input_length;
  if (mode === 'output_length') return req.output_length;
  if (mode === 'prefix_blocks') return req.prefix_blocks;
  if (mode === 'total_tokens') return req.total_tokens;
  if (mode === 'ttft_ms') return req.ttft_ms || 0;
  if (mode === 'itl_ms') return req.itl_ms || 0;
  if (mode === 'gpu') return req.pipeline?.gpu ?? 0.25;
  if (mode === 'network') return req.pipeline?.network ?? 0.25;
  if (mode === 'storage') return req.pipeline?.storage ?? 0.25;
  if (mode === 'cpu') return req.pipeline?.cpu ?? 0.25;
  return req.latency_ms;
}

function metricBaseline(mode) {
  const b = data?.meta?.baselines || {};
  if (mode === 'ttft_ms') return b.ttft_ms || data.meta.baseline_latency_ms;
  if (mode === 'itl_ms') return b.itl_ms || 1;
  if (mode === 'input_length') return data.meta.max_isl || 1;
  if (mode === 'output_length') return Math.max(...data.requests.map(r => r.output_length), 1);
  if (mode === 'total_tokens') return data.meta.max_tokens || 1;
  if (mode === 'prefix_blocks') return Math.max(...data.requests.map(r => r.prefix_blocks), 1);
  return data.meta.baseline_latency_ms;
}

function requestHeightMetric(req, mode) {
  const baseline = metricBaseline(mode);
  const v = metricValue(req, mode);
  if (['gpu', 'network', 'storage', 'cpu'].includes(mode)) return Math.max(0.2, v * 2.2);
  return Math.min(2.8, v / Math.max(baseline, 1e-6));
}

function metricRatio(req, mode, baseline) {
  const v = metricValue(req, mode);
  if (['gpu','network','storage','cpu'].includes(mode)) return Math.max(0.25, v * 4);
  return Math.max(0.2, v / Math.max(baseline, 1e-6));
}

function colorInputForMode(req, mode, baseline) {
  const v = metricValue(req, mode);
  if (mode === 'latency' || mode === 'ttft_ms' || mode === 'itl_ms') return baseline / Math.max(v, 1e-6);
  const ratio = metricRatio(req, mode, baseline);
  if (['gpu','network','storage','cpu'].includes(mode)) return ratio;
  return 2.1 - Math.min(1.8, ratio);
}

function loadMetricEnabled() {
  try {
    const raw = localStorage.getItem(METRIC_STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    for (const id of ALL_METRIC_IDS) {
      if (typeof parsed[id] === 'boolean') metricEnabled[id] = parsed[id];
    }
  } catch (_) { /* ignore */ }
}

function saveMetricEnabled() {
  try { localStorage.setItem(METRIC_STORAGE_KEY, JSON.stringify(metricEnabled)); } catch (_) { /* ignore */ }
}

function metricLayerOffset(mi, span = 1, layerCount = currentMetricLayers().length) {
  const angle = (mi / layerCount) * Math.PI * 2 - Math.PI / 2;
  const r = 0.038 * span;
  return [Math.cos(angle) * r, Math.sin(angle) * r * 0.32, Math.sin(angle) * r * 0.68];
}

function metricNorm(req, mode) {
  const ratio = metricRatio(req, mode, metricBaseline(mode));
  return Math.min(1, Math.max(0.1, ratio / 2.2));
}

function metricColorRgb(mode, out) {
  const hex = metricDefById(mode)?.color ?? 0xffffff;
  color.setHex(hex);
  out[0] = color.r; out[1] = color.g; out[2] = color.b;
}

function createMetricInstancedLayers(group, n, layers, geoRadius = 0.008) {
  const meshes = [];
  for (const layer of layers) {
    const geo = new THREE.SphereGeometry(geoRadius, 7, 7);
    const mat = new THREE.MeshStandardMaterial({
      color: layer.color,
      emissive: layer.color,
      emissiveIntensity: 0.58,
      metalness: 0.18,
      roughness: 0.4,
      transparent: true,
      opacity: 0.94,
    });
    const mesh = new THREE.InstancedMesh(geo, mat, n);
    mesh.frustumCulled = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    mesh.userData.metricId = layer.id;
    mesh.visible = metricEnabled[layer.id];
    group.add(mesh);
    meshes.push(mesh);
  }
  meshes._layers = layers;
  return meshes;
}

function syncMetricMeshVisibility(meshes) {
  const layers = meshes._layers;
  if (!layers) return;
  for (let mi = 0; mi < layers.length; mi++) {
    meshes[mi].visible = metricEnabled[layers[mi].id];
  }
}

function paintMetricInstances(meshes, opts) {
  const {
    getPos,
    tMs,
    minSize,
    maxSize,
    useReqSize = true,
    span = 1,
    opacityScale = 1,
    animatePulse = true,
  } = opts;
  const layers = meshes._layers || currentMetricLayers();
  const pulse = animatePulse ? 0.5 + 0.5 * Math.sin(performance.now() * 0.004) : 1;
  const n = data.requests.length;

  for (let mi = 0; mi < layers.length; mi++) {
    const mesh = meshes[mi];
    const layer = layers[mi];
    const enabled = metricEnabled[layer.id];
    mesh.visible = enabled;
    const [ox, oy, oz] = metricLayerOffset(mi, span, layers.length);

    for (let i = 0; i < n; i++) {
      const req = data.requests[i];
      const life = requestLife(req, tMs);
      const norm = metricNorm(req, layer.id);
      let size = useReqSize
        ? minSize + req.size * (maxSize - minSize)
        : minSize + norm * (maxSize - minSize);
      let sizeMult = 0.38 + 0.62 * norm;
      let alpha = opacityScale;

      if (life.phase === 'pending') { sizeMult *= 0.22; alpha *= 0.14; }
      else if (life.phase === 'done') { sizeMult *= 0.68; alpha *= 0.42; }
      else { sizeMult *= 1.08 + 0.14 * pulse; }

      const [bx, by, bz] = getPos(i);
      dummy.position.set(bx + ox, by + oy, bz + oz);
      dummy.scale.setScalar(enabled ? size * sizeMult * alpha : 0.0001);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
  }
}

function buildMetricLegend() {
  const root = document.getElementById('legendItems');
  root.innerHTML = currentMetricLayers().map(layer => {
    const hex = `#${layer.color.toString(16).padStart(6, '0')}`;
    const on = metricEnabled[layer.id];
    return `<label class="item${on ? '' : ' off'}" data-metric="${layer.id}">
      <input type="checkbox" ${on ? 'checked' : ''} aria-label="${layer.label}">
      <span class="swatch" style="background:${hex}"></span>
      <span>${layer.label}</span>
    </label>`;
  }).join('');

  root.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT') return;
      const cb = el.querySelector('input');
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
    });
    el.querySelector('input').addEventListener('change', e => {
      const id = el.dataset.metric;
      metricEnabled[id] = e.target.checked;
      el.classList.toggle('off', !e.target.checked);
      saveMetricEnabled();
      syncAllMetricVisibility();
      if (surfaceGeom) buildSurfaceHeightsMulti();
      updateFrame();
    });
  });
}

function syncAllMetricVisibility() {
  for (const meshes of [fabricMetricMeshes, topoMetricMeshes, scatterMetricMeshes, feastMetricMeshes, stackMetricMeshes]) {
    if (meshes.length) syncMetricMeshVisibility(meshes);
  }
}

function pointerToNdc(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  pointerNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointerNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
}

function getHoverMeshes() {
  if (!data) return [];
  const out = [];
  const vis = m => m.visible;
  if (activeView === 'fabric') out.push(...fabricMetricMeshes.filter(vis));
  else if (activeView === 'topology') {
    out.push(...topoMetricMeshes.filter(vis));
    out.push(...hubMeshes);
  } else if (activeView === 'stack') {
    out.push(...stackMetricMeshes.filter(vis));
    out.push(...stackLayerMeshes);
  } else if (activeView === 'scatter') out.push(...scatterMetricMeshes.filter(vis));
  else if (activeView === 'feast') {
    out.push(...feastMetricMeshes.filter(vis));
    out.push(...feastHubMeshes);
  } else if (activeView === 'surface' && surfaceMesh) out.push(surfaceMesh);
  return out;
}

function resolveHover(hit) {
  const obj = hit.object;
  if (obj.userData?.hubId) return { kind: 'feast_hub', hubId: obj.userData.hubId };
  if (obj.userData?.subId) return { kind: 'topology_hub', subId: obj.userData.subId };
  if (obj === surfaceMesh) {
    const cell = surfaceCellAtPoint(hit.point);
    return cell ? { kind: 'surface_cell', ...cell } : null;
  }
  if (hit.instanceId == null || hit.instanceId < 0) return null;
  const req = data.requests[hit.instanceId];
  if (!req) return null;
  const layerIdx = stackLayerMeshes.indexOf(obj);
  return {
    kind: 'request',
    req,
    reqIdx: hit.instanceId,
    metricId: obj.userData?.metricId || null,
    stackLayerId: layerIdx >= 0 ? STACK_ORDER[layerIdx] : null,
  };
}

function surfaceCellAtPoint(point) {
  if (!surfaceHeights || !surfaceDominant) return null;
  const tb = SURFACE_TIME_BINS;
  const lb = surfaceLaneBins;
  const ti = Math.min(tb - 1, Math.max(0, Math.floor(((point.x + 1.2) / 2.4) * tb)));
  const li = Math.min(lb - 1, Math.max(0, Math.floor(((point.z + 1.2) / 2.4) * lb)));
  const idx = li * tb + ti;
  const surfaceLayers = layersForView('surface');
  const dom = surfaceLayers[surfaceDominant[idx]] || surfaceLayers[0];
  const dur = data.meta.duration_ms;
  const t0 = (ti / tb) * dur;
  const t1 = ((ti + 1) / tb) * dur;
  return {
    ti, li, idx,
    height: surfaceHeights[idx],
    count: surfaceCounts[idx],
    metricId: dom?.id,
    metricLabel: dom?.label,
    metricColor: dom?.color,
    timeLabel: `${formatTime(t0)} – ${formatTime(t1)}`,
    laneLabel: `Lane ${li + 1}`,
  };
}

function metricSourceTag(req, field) {
  if (field === 'latency' && req.latency_source === 'measured') return 'measured';
  if ((field === 'ttft_ms' || field === 'itl_ms') && req.metrics_source === 'measured') return 'measured';
  if (req.metrics_source === 'measured') return 'measured';
  return req.latency_source === 'measured' ? 'measured' : 'estimated';
}

function formatPipelinePct(req, key) {
  const v = req.pipeline?.[key];
  return v != null ? `${(v * 100).toFixed(1)}%` : '—';
}

function tipRow(label, value, color = null, highlight = false, source = '') {
  const sw = color != null
    ? `<span class="tip-sw" style="background:#${color.toString(16).padStart(6, '0')}"></span>`
    : '';
  const src = source ? `<span class="tip-src">${source}</span>` : '';
  return `<div class="tip-row${highlight ? ' hi' : ''}"><span class="k">${sw}${label}${src}</span><span class="v">${value}</span></div>`;
}

function requestPhaseLabel(req, tMs) {
  const life = requestLife(req, tMs);
  if (life.phase === 'pending') return 'pending';
  if (life.phase === 'done') return 'completed';
  return `active · ${Math.round(life.progress * 100)}%`;
}

function buildRequestTooltip(ctx, tMs) {
  const { req, reqIdx, metricId, stackLayerId } = ctx;
  const layers = currentMetricLayers();
  const rows = [];

  for (const layer of layers) {
    if (!metricEnabled[layer.id]) continue;
    let value = '—';
    let source = '';
    if (layer.id === 'latency') {
      value = formatMs(req.latency_ms);
      source = metricSourceTag(req, 'latency');
    } else if (layer.id === 'ttft_ms') {
      value = formatMs(req.ttft_ms);
      source = metricSourceTag(req, 'ttft_ms');
    } else if (layer.id === 'itl_ms') {
      value = formatItl(req.itl_ms);
      source = metricSourceTag(req, 'itl_ms');
    } else if (layer.id === 'input_length') {
      value = `${formatCount(req.input_length)} tok`;
    } else if (layer.id === 'output_length') {
      value = `${formatCount(req.output_length)} tok`;
    } else if (layer.id === 'total_tokens') {
      value = `${formatCount(req.total_tokens)} tok`;
    } else if (layer.id === 'prefix_blocks') {
      value = formatCount(req.prefix_blocks);
    } else if (layer.id === 'gpu') {
      value = formatPipelinePct(req, 'gpu');
    } else if (layer.id === 'network') {
      value = formatPipelinePct(req, 'network');
    } else if (layer.id === 'storage') {
      value = formatPipelinePct(req, 'storage');
    } else if (layer.id === 'cpu') {
      value = formatPipelinePct(req, 'cpu');
    }
    rows.push(tipRow(layer.label, value, layer.color, layer.id === metricId, source));
  }

  const hdr = stackLayerId
    ? `Request #${req.id ?? reqIdx} · ${STACK_LABELS[stackLayerId]}`
    : `Request #${req.id ?? reqIdx}`;
  const bead = metricId ? metricDefById(metricId)?.label : null;
  const sub = [
    requestPhaseLabel(req, tMs),
    `${formatTime(req.start_ms)} → ${formatTime(req.end_ms)}`,
    bead ? `bead: ${bead}` : null,
    req.prefix_lane != null ? `prefix lane ${req.prefix_lane}` : null,
    req.session_lane != null ? `session lane ${req.session_lane}` : null,
    req.session_id ? `session ${req.session_id}` : null,
  ].filter(Boolean).join(' · ');

  const extra = [];
  if (!layers.some(l => l.id === 'input_length') && metricEnabled.input_length) {
    extra.push(tipRow('Input length', `${formatCount(req.input_length)} tok`, 0x9fd4a8));
  }
  if (req.prefill_tput > 0) extra.push(tipRow('Prefill throughput', formatTput(req.prefill_tput)));
  if (req.decode_tput > 0) extra.push(tipRow('Decode throughput', formatTput(req.decode_tput)));

  return { hdr, sub, rows: [...rows, ...extra] };
}

function buildHubTooltip(ctx, tMs) {
  if (ctx.kind === 'topology_hub') {
    const labels = { network: 'Network ingress', storage: 'Storage / KV cache', cpu: 'CPU scheduler', gpu: 'GPU compute' };
    const hi = hubMeshes.findIndex(m => m.userData.subId === ctx.subId);
    const frame = sampleTopologyWindow(tMs, sampleFabricWindow(tMs));
    const stress = frame?.hub_stress?.[hi];
    return {
      hdr: labels[ctx.subId] || ctx.subId,
      sub: 'Streets subsystem hub',
      rows: [
        tipRow('Subsystem', ctx.subId, SUB_COLORS[ctx.subId]),
        tipRow('Stress', stress != null ? `${stress.toFixed(2)}×` : '—'),
      ],
    };
  }
  const hi = FEAST_HUB_ORDER.indexOf(ctx.hubId);
  const frame = sampleHardwareWindow(tMs);
  const stress = frame?.layer_stress?.[hi];
  return {
    hdr: `${STACK_LABELS[ctx.hubId]} hub`,
    sub: 'Resource Feast infrastructure node',
    rows: [
      tipRow('Resource', STACK_LABELS[ctx.hubId], STACK_COLORS[ctx.hubId]),
      tipRow('Layer stress', stress != null ? `${stress.toFixed(2)}×` : '—'),
      tipRow('Allocation', feastOptimize >= 0.72 ? 'harmony' : feastOptimize >= 0.4 ? 'balancing' : 'chaos'),
    ],
  };
}

function buildSurfaceTooltip(ctx) {
  const rows = [
    tipRow('Time window', ctx.timeLabel),
    tipRow('Prefix lane', ctx.laneLabel),
    tipRow('Requests in cell', formatCount(ctx.count)),
  ];
  if (ctx.height > 0 && ctx.metricLabel) {
    rows.push(tipRow(ctx.metricLabel, ctx.height.toFixed(2), ctx.metricColor, true));
  }
  return {
    hdr: 'Surface cell',
    sub: 'Aggregated peak metric for time × lane',
    rows,
  };
}

function renderTooltip(payload) {
  const el = document.getElementById('tooltip');
  if (!payload) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <div class="tip-hdr">${payload.hdr}</div>
    <div class="tip-sub">${payload.sub}</div>
    <div class="tip-rows">${payload.rows.join('')}</div>`;
  el.classList.add('visible');
  positionTooltip(pointerClient.x, pointerClient.y);
}

function positionTooltip(clientX, clientY) {
  const el = document.getElementById('tooltip');
  const pad = 16;
  el.style.left = '0';
  el.style.top = '0';
  el.classList.add('visible');
  const rect = el.getBoundingClientRect();
  let left = clientX + pad;
  let top = clientY + pad;
  if (left + rect.width > window.innerWidth - 10) left = clientX - rect.width - pad;
  if (top + rect.height > window.innerHeight - 10) top = clientY - rect.height - pad;
  left = Math.max(8, left);
  top = Math.max(8, top);
  el.style.left = `${left}px`;
  el.style.top = `${top}px`;
}

function pickHover() {
  hoverPickPending = false;
  if (!data) { renderTooltip(null); canvas.style.cursor = ''; return; }

  const targets = getHoverMeshes();
  if (!targets.length) { renderTooltip(null); canvas.style.cursor = ''; return; }

  raycaster.setFromCamera(pointerNdc, camera);
  const hits = raycaster.intersectObjects(targets, false);
  let ctx = hits.length ? resolveHover(hits[0]) : null;
  if (!ctx) ctx = pickNearestRequestScreen();
  if (!ctx) {
    lastHoverKey = '';
    lastHoverCtx = null;
    renderTooltip(null);
    canvas.style.cursor = '';
    return;
  }

  const tMs = tNorm * data.meta.duration_ms;
  let key = '';
  let payload = null;
  if (ctx.kind === 'request') {
    key = `r:${ctx.reqIdx}:${ctx.metricId || ''}:${ctx.stackLayerId || ''}`;
    payload = buildRequestTooltip(ctx, tMs);
  } else if (ctx.kind === 'surface_cell') {
    key = `s:${ctx.idx}`;
    payload = buildSurfaceTooltip(ctx);
  } else {
    key = `h:${ctx.kind}:${ctx.hubId || ctx.subId}`;
    payload = buildHubTooltip(ctx, tMs);
  }

  lastHoverCtx = ctx;
  if (key !== lastHoverKey || ctx.kind === 'request') {
    lastHoverKey = key;
    renderTooltip(payload);
  } else {
    positionTooltip(pointerClient.x, pointerClient.y);
  }
  canvas.style.cursor = 'pointer';
}

function requestWorldPos(reqIdx) {
  const tMs = tNorm * data.meta.duration_ms;
  if (activeView === 'fabric') {
    const f = sampleFabricWindow(tMs);
    if (!f?.positions_flat) return null;
    const pf = f.positions_flat;
    return [pf[reqIdx * 3], pf[reqIdx * 3 + 1], pf[reqIdx * 3 + 2]];
  }
  if (activeView === 'topology' && topoSmoothPos) {
    const pf = topoSmoothPos;
    return [pf[reqIdx * 3], pf[reqIdx * 3 + 1], pf[reqIdx * 3 + 2]];
  }
  if (activeView === 'scatter' && scatterMetricCache) {
    const m = scatterMetricCache[reqIdx];
    const req = data.requests[reqIdx];
    let yLift = 0;
    for (const layer of layersForView('scatter')) {
      if (!metricEnabled[layer.id]) continue;
      yLift += requestHeightMetric(req, layer.id) * 0.06;
    }
    if (!yLift) yLift = requestHeightMetric(req, 'latency') * 0.42;
    return [m.x + m.y * 0.05 + m.jitter, yLift, m.z + m.jitter * 0.6];
  }
  if (activeView === 'stack' && stackLayerMeshes.length) {
    const frame = sampleHardwareWindow(tMs) || { tMs, breath: 1 };
    const pos = stackLayerPosition(data.requests[reqIdx], 3, reqIdx, tMs, frame);
    return [pos.x, pos.y, pos.z];
  }
  if (activeView === 'feast' && feastBodies[reqIdx]) {
    const b = feastBodies[reqIdx];
    return [b.x, b.y, b.z];
  }
  return null;
}

function pickNearestRequestScreen(maxPx = 18) {
  if (!data || activeView === 'surface') return null;
  const rect = canvas.getBoundingClientRect();
  const mx = pointerClient.x;
  const my = pointerClient.y;
  let bestIdx = -1;
  let bestD = maxPx;
  for (let i = 0; i < data.requests.length; i++) {
    const p = requestWorldPos(i);
    if (!p) continue;
    hoverProject.set(p[0], p[1], p[2]).project(camera);
    if (hoverProject.z > 1) continue;
    const sx = (hoverProject.x * 0.5 + 0.5) * rect.width + rect.left;
    const sy = (-hoverProject.y * 0.5 + 0.5) * rect.height + rect.top;
    const d = Math.hypot(sx - mx, sy - my);
    if (d < bestD) { bestD = d; bestIdx = i; }
  }
  if (bestIdx < 0) return null;
  return {
    kind: 'request',
    req: data.requests[bestIdx],
    reqIdx: bestIdx,
    metricId: null,
    stackLayerId: null,
  };
}

function scheduleHoverPick() {
  if (!hoverPickPending) {
    hoverPickPending = true;
    requestAnimationFrame(pickHover);
  }
}

function hideTooltip() {
  lastHoverKey = '';
  lastHoverCtx = null;
  hoverPickPending = false;
  renderTooltip(null);
  canvas.style.cursor = '';
}

function refreshHoverTooltip() {
  if (!lastHoverCtx || !data) return;
  const tMs = tNorm * data.meta.duration_ms;
  if (lastHoverCtx.kind === 'request') {
    renderTooltip(buildRequestTooltip(lastHoverCtx, tMs));
    positionTooltip(pointerClient.x, pointerClient.y);
  }
}

function lerp(a,b,t){ return a+(b-a)*t; }

function sampleFabricWindow(tMs) {
  const windows = data.windows;
  if (!windows.length) return null;
  if (tMs <= windows[0].t_ms) return { ...windows[0], tMs: windows[0].t_ms };
  for (let i = 1; i < windows.length; i++) {
    const w0 = windows[i-1], w1 = windows[i];
    if (tMs <= w1.t_ms) {
      const u = (tMs - w0.t_ms) / Math.max(w1.t_ms - w0.t_ms, 1e-6);
      const n = data.requests.length;
      const positions_flat = new Array(n * 3);
      for (let j = 0; j < n * 3; j++) positions_flat[j] = lerp(w0.positions_flat[j], w1.positions_flat[j], u);
      return {
        breath: lerp(w0.breath, w1.breath, u),
        active_requests: Math.round(lerp(w0.active_requests, w1.active_requests, u)),
        positions_flat, tMs,
      };
    }
  }
  const last = windows.at(-1);
  return { ...last, tMs: last.t_ms };
}

function warpStreets(x, y, z, breath) {
  const theta = (x + 1) * Math.PI;
  const R = 1.08 * breath;
  const r = 0.34 * (z + 1) * 0.5;
  const phi = y * Math.PI * 0.9;
  const wx = (R + r * Math.cos(phi)) * Math.cos(theta) + 0.2 * y * Math.sin(theta * 2.35);
  const wy = (R + r * Math.cos(phi)) * Math.sin(theta) - 0.16 * z * Math.cos(theta * 1.65);
  const wz = r * Math.sin(phi) + 0.34 * z * Math.cos(y * Math.PI * 0.55);
  return [wx, wy, wz];
}

function fallbackTopologyFrame(fabricFrame) {
  const breath = fabricFrame.breath ?? 1;
  const pf = fabricFrame.positions_flat;
  const positions_flat = new Array(pf.length);
  for (let i = 0; i < pf.length; i += 3) {
    const [wx, wy, wz] = warpStreets(pf[i], pf[i + 1], pf[i + 2], breath);
    positions_flat[i] = wx;
    positions_flat[i + 1] = wy;
    positions_flat[i + 2] = wz;
  }
  return { ...fabricFrame, positions_flat, street_flat: null };
}

function sampleTopologyWindow(tMs, fabricFrame = null) {
  const windows = data.topology?.windows;
  if (!windows?.length) return fabricFrame ? fallbackTopologyFrame(fabricFrame) : null;
  let frame = null;
  if (tMs <= windows[0].t_ms) frame = { ...windows[0], tMs: windows[0].t_ms };
  else if (tMs >= windows.at(-1).t_ms) frame = { ...windows.at(-1), tMs: windows.at(-1).t_ms };
  else {
    for (let i = 1; i < windows.length; i++) {
      const w0 = windows[i - 1], w1 = windows[i];
      if (tMs <= w1.t_ms) {
        const u = (tMs - w0.t_ms) / Math.max(w1.t_ms - w0.t_ms, 1e-6);
        const nPos = w0.positions_flat?.length ?? 0;
        const positions_flat = w0.positions_flat ? new Array(nPos) : null;
        if (positions_flat) {
          for (let j = 0; j < nPos; j++) positions_flat[j] = lerp(w0.positions_flat[j], w1.positions_flat[j], u);
        }
        const nStreet = w0.street_flat?.length ?? 0;
        const street_flat = w0.street_flat ? new Array(nStreet) : null;
        if (street_flat) {
          for (let j = 0; j < nStreet; j++) street_flat[j] = lerp(w0.street_flat[j], w1.street_flat[j], u);
        }
        const hubs_flat = w0.hubs_flat.map((v, j) => lerp(v, w1.hubs_flat[j], u));
        const hub_stress = w0.hub_stress.map((v, j) => lerp(v, w1.hub_stress[j], u));
        frame = {
          breath: lerp(w0.breath, w1.breath, u),
          active_requests: Math.round(lerp(w0.active_requests, w1.active_requests, u)),
          positions_flat, street_flat, hubs_flat, hub_stress, tMs,
        };
        break;
      }
    }
  }
  if (!frame?.positions_flat && fabricFrame) return fallbackTopologyFrame(fabricFrame);
  return frame;
}

function formatTime(ms) {
  const sec = ms / 1000;
  return `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, '0')}`;
}

function formatMs(v) {
  if (!v || v <= 0) return '—';
  if (v >= 10000) return `${(v / 1000).toFixed(2)} s`;
  return `${Math.round(v).toLocaleString()} ms`;
}

function formatItl(v) {
  if (!v || v <= 0) return '—';
  return `${v.toFixed(v < 10 ? 2 : 1)} ms`;
}

function formatTput(v) {
  if (!v || v <= 0) return '—';
  return `${Math.round(v).toLocaleString()} tok/s`;
}

function formatCount(v) {
  return Math.round(v || 0).toLocaleString();
}

function setDial(key, value, scaleKey) {
  const path = document.getElementById(`dial-${key}`);
  if (!path) return;
  const scale = data?.meta?.dashboard_scale?.[scaleKey] || data?.meta?.baselines?.[scaleKey] || 1;
  const pct = Math.min(1, Math.max(0, value / Math.max(scale, 1e-6)));
  path.style.strokeDasharray = `${(75.4 * pct).toFixed(1)} 75.4`;
}

function sampleDashboardWindow(tMs) {
  const windows = data.dashboard?.windows;
  if (!windows?.length) return null;
  if (tMs <= windows[0].t_ms) return { ...windows[0], tMs: windows[0].t_ms };
  for (let i = 1; i < windows.length; i++) {
    const w0 = windows[i - 1], w1 = windows[i];
    if (tMs <= w1.t_ms) {
      const u = (tMs - w0.t_ms) / Math.max(w1.t_ms - w0.t_ms, 1e-6);
      const out = { tMs };
      for (const key of DASH_NUMERIC_KEYS) out[key] = lerp(w0[key] ?? 0, w1[key] ?? 0, u);
      return out;
    }
  }
  return { ...windows.at(-1), tMs: windows.at(-1).t_ms };
}

function updateDashboard(frame) {
  if (!dashInitialized || !frame) return;
  const smooth = playing ? 0.22 : 0.38;
  for (const key of DASH_NUMERIC_KEYS) {
    dashDisplay[key] += ((frame[key] ?? 0) - dashDisplay[key]) * smooth;
  }

  const d = dashDisplay;
  document.getElementById('val-ttft_p50_ms').textContent = formatMs(d.ttft_p50_ms);
  document.getElementById('val-itl_p50_ms').textContent = formatItl(d.itl_p50_ms);
  document.getElementById('val-latency_p50_ms').textContent = formatMs(d.latency_p50_ms);
  document.getElementById('val-ttft_live_ms').textContent = formatMs(d.ttft_live_ms);
  document.getElementById('val-stress_index').textContent = `${d.stress_index.toFixed(2)}×`;
  document.getElementById('val-decode_tput').textContent = formatTput(d.decode_tput);
  document.getElementById('val-prefill_tput').textContent = formatTput(d.prefill_tput);
  document.getElementById('val-active').textContent = formatCount(d.active);
  document.getElementById('val-in_prefill').textContent = formatCount(d.in_prefill);
  document.getElementById('val-in_decode').textContent = formatCount(d.in_decode);
  document.getElementById('val-pending').textContent = formatCount(d.pending);
  document.getElementById('val-input_tokens_avg').textContent = formatCount(d.input_tokens_avg);
  document.getElementById('val-output_tokens_avg').textContent = formatCount(d.output_tokens_avg);

  const p90 = (key, fmt) => {
    const el = document.getElementById(`p90-${key}`);
    if (!el) return;
    const v = frame[`${key.replace('_p50', '_p90')}`] ?? frame[`${key}_ms`];
    el.textContent = fmt === 'itl' ? `p90 ${formatItl(v)}` : `p90 ${formatMs(v)}`;
  };
  p90('ttft_p50_ms', 'ms');
  p90('itl_p50_ms', 'itl');
  p90('latency_p50_ms', 'ms');

  setDial('ttft_p50_ms', d.ttft_p50_ms, 'ttft_ms');
  setDial('itl_p50_ms', d.itl_p50_ms, 'itl_ms');
  setDial('latency_p50_ms', d.latency_p50_ms, 'latency_ms');
  setDial('ttft_live_ms', d.ttft_live_ms, 'ttft_ms');
  setDial('stress_index', d.stress_index, 'stress_index');
  setDial('decode_tput', d.decode_tput, 'decode_tput');

  const avail = data.meta.metric_availability || {};
  const src = data.meta.measured_metrics?.ttft ? 'measured + estimated' : 'estimated from trace';
  document.getElementById('dash-source').textContent =
    `TTFT ${avail.time_to_first_token ?? 0}/${data.requests.length} · ${src}`;
}

function topologyExtent() {
  const pf = data.topology?.windows?.[0]?.positions_flat;
  if (!pf?.length) return data.meta.extent;
  let xmin = Infinity, xmax = -Infinity, ymin = Infinity, ymax = -Infinity, zmin = Infinity, zmax = -Infinity;
  for (let i = 0; i < pf.length; i += 3) {
    xmin = Math.min(xmin, pf[i]); xmax = Math.max(xmax, pf[i]);
    ymin = Math.min(ymin, pf[i + 1]); ymax = Math.max(ymax, pf[i + 1]);
    zmin = Math.min(zmin, pf[i + 2]); zmax = Math.max(zmax, pf[i + 2]);
  }
  const pad = 0.35;
  return [xmin - pad, xmax + pad, ymin - pad, ymax + pad, zmin - pad, zmax + pad];
}

function buildScatterMetricCache() {
  const dur = data.meta.duration_ms;
  const maxIsl = data.meta.max_isl || Math.max(...data.requests.map(r => r.input_length), 1);
  const maxOut = Math.max(...data.requests.map(r => r.output_length), 1);
  const logMax = Math.log10(Math.max(maxIsl, 1));
  scatterMetricCache = data.requests.map((req, idx) => {
    const laneNorm = nPrefixLanes > 1 ? (req.prefix_lane + 1) / nPrefixLanes : 0.5;
    return {
      x: (req.start_ms / dur) * 2 - 1,
      y: laneNorm * 2 - 1,
      z: (Math.log10(Math.max(req.input_length, 1)) / logMax) * 2 - 1,
      size: 0.28 + 0.72 * (req.output_length / maxOut),
      jitter: 0.018 * Math.sin(idx * 2.17 + req.prefix_lane * 0.8),
    };
  });
}

function buildSurfaceHeightsMulti() {
  surfaceHeightMode = 'multi';
  const lanes = [...new Set(data.requests.map(r => r.prefix_lane))].sort((a, b) => a - b);
  const laneIndex = Object.fromEntries(lanes.map((l, i) => [l, i]));
  const tb = SURFACE_TIME_BINS;
  const lb = surfaceLaneBins;
  surfaceHeights = new Float32Array(tb * lb);
  surfaceCounts = new Uint16Array(tb * lb);
  surfaceDominant = new Uint8Array(tb * lb);
  const dur = data.meta.duration_ms;

  for (const req of data.requests) {
    const ti = Math.min(tb - 1, Math.floor((req.start_ms / dur) * tb));
    const li = Math.min(lb - 1, Math.floor(((laneIndex[req.prefix_lane] ?? 0) / Math.max(lanes.length - 1, 1)) * (lb - 1)));
    const idx = li * tb + ti;
    const surfaceLayers = layersForView('surface');
    for (let mi = 0; mi < surfaceLayers.length; mi++) {
      const layer = surfaceLayers[mi];
      if (!metricEnabled[layer.id]) continue;
      const h = requestHeightMetric(req, layer.id);
      if (h > surfaceHeights[idx]) {
        surfaceHeights[idx] = h;
        surfaceDominant[idx] = mi;
      }
    }
    surfaceCounts[idx]++;
  }

  const smoothed = new Float32Array(surfaceHeights);
  for (let li = 0; li < lb; li++) {
    for (let ti = 0; ti < tb; ti++) {
      let sum = 0, cnt = 0;
      for (let dj = -1; dj <= 1; dj++) {
        for (let di = -1; di <= 1; di++) {
          const nj = li + dj, ni = ti + di;
          if (nj < 0 || nj >= lb || ni < 0 || ni >= tb) continue;
          const v = surfaceHeights[nj * tb + ni];
          if (v > 0) { sum += v; cnt++; }
        }
      }
      if (cnt) smoothed[li * tb + ti] = sum / cnt;
    }
  }
  surfaceHeights = smoothed;
}

function buildSurfaceScene() {
  clearGroup(surfaceGroup);
  surfaceMesh = null;

function updateScatter(frame) {
  if (!scatterMetricMeshes.length || !scatterMetricCache) return 0;
  const tMs = frame.tMs ?? 0;
  let activeCount = 0;
  for (const req of data.requests) {
    if (requestLife(req, tMs).phase === 'active') activeCount++;
  }

  paintMetricInstances(scatterMetricMeshes, {
    tMs,
    minSize: 0.16,
    maxSize: 1.45,
    span: 0.85,
    getPos: i => {
      const m = scatterMetricCache[i];
      const req = data.requests[i];
      const life = requestLife(req, tMs);
      let yLift = 0;
      for (const layer of layersForView('scatter')) {
        if (!metricEnabled[layer.id]) continue;
        yLift += requestHeightMetric(req, layer.id) * 0.06;
      }
      if (!yLift) yLift = requestHeightMetric(req, 'latency') * 0.42;
      if (life.phase === 'pending') yLift *= 0.05;
      else if (life.phase === 'active') yLift *= 1.05;
      return [m.x + m.y * 0.05 + m.jitter, yLift, m.z + m.jitter * 0.6];
    },
  });
  return activeCount;
}

function updateSurface(frame) {
  if (!surfaceGeom || !surfaceHeights) return 0;
  if (surfaceHeightMode !== 'multi') buildSurfaceHeightsMulti();

  const pos = surfaceGeom.attributes.position;
  const col = surfaceGeom.attributes.color;
  const tb = SURFACE_TIME_BINS;
  const lb = surfaceLaneBins;
  const tMs = frame.tMs ?? 0;
  const dur = data.meta.duration_ms;
  const timeCut = (tMs / dur) * 2 - 1;
  const breath = frame.breath ?? 1;
  const rgb = [0, 0, 0];
  let activeCount = 0;
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.0035);

  for (const req of data.requests) {
    if (req.start_ms <= tMs && tMs <= req.end_ms) activeCount++;
  }

  for (let j = 0; j <= lb - 1; j++) {
    for (let i = 0; i <= tb - 1; i++) {
      const vi = j * tb + i;
      const x = -1.2 + (i / Math.max(tb - 1, 1)) * 2.4;
      const z = -1.2 + (j / Math.max(lb - 1, 1)) * 2.4;
      const cellX = (i + 0.5) / tb * 2 - 1;
      const revealed = cellX <= timeCut + 0.04;
      const idx = j * tb + i;
      let h = revealed ? surfaceHeights[idx] : 0;
      if (revealed && h > 0) h *= 0.34 * (0.92 + 0.14 * (breath - 1));
      if (revealed && surfaceCounts[idx] > 0) h += 0.02 * Math.min(surfaceCounts[idx], 6);
      const y = h * (revealed ? 1 : 0) + (revealed && h > 0 ? 0.03 * pulse : 0);
      pos.setXYZ(vi, x, y, z);
      const surfaceLayers = layersForView('surface');
      const dom = surfaceDominant?.[idx] ?? 0;
      const layer = surfaceLayers[dom] || surfaceLayers[0];
      if (revealed && h > 0 && metricEnabled[layer.id]) metricColorRgb(layer.id, rgb);
      else { rgb[0] = 0.2; rgb[1] = 0.24; rgb[2] = 0.3; }
      const dim = revealed ? 0.45 + 0.55 * Math.min(h / 0.9, 1) : 0.08;
      col.setXYZ(vi, rgb[0] * dim, rgb[1] * dim, rgb[2] * dim);
    }
  }
  pos.needsUpdate = true;
  col.needsUpdate = true;
  surfaceGeom.computeVertexNormals();
  return activeCount;
}

function feastChaos() {
  return Math.max(0, Math.min(1, 1 - feastOptimize));
}

function feastTint(rgb, optimize) {
  const cool = Math.max(0, (optimize - 0.35) / 0.65);
  rgb[0] = rgb[0] * (1 - cool) + 0.38 * cool;
  rgb[1] = rgb[1] * (1 - cool) + 0.72 * cool;
  rgb[2] = rgb[2] * (1 - cool) + 0.92 * cool;
}

function buildFeastScene() {
  clearGroup(feastGroup);
  feastHubMeshes = [];
  feastBodies = [];
  feastSprings = (data.edges || []).filter(e => e.type === 'cache' || e.type === 'session');

  const ext = data.meta.extent;
  const cx = (ext[0] + ext[1]) / 2;
  const cy = (ext[2] + ext[3]) / 2;
  const cz = (ext[4] + ext[5]) / 2;
  const span = Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4], 0.5);

  const hubLayout = {
    gpu: [0, 0.12, 0],
    network: [-0.62, 0.05, 0.42],
    storage: [0.58, -0.08, 0.38],
    kv_cache: [-0.42, 0.22, -0.48],
    hbm: [0.48, -0.18, -0.42],
  };
  feastHubPos = FEAST_HUB_ORDER.map(id => {
    const o = hubLayout[id];
    return [cx + o[0] * span, cy + o[1] * span, cz + o[2] * span];
  });

  for (let hi = 0; hi < FEAST_HUB_ORDER.length; hi++) {
    const id = FEAST_HUB_ORDER[hi];
    const p = feastHubPos[hi];
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.09, 18, 18),
      new THREE.MeshStandardMaterial({
        color: STACK_COLORS[id],
        emissive: STACK_COLORS[id],
        emissiveIntensity: 0.55,
        metalness: 0.35,
        roughness: 0.38,
      }),
    );
    mesh.position.set(p[0], p[1], p[2]);
    mesh.userData.hubId = id;
    feastHubMeshes.push(mesh);
    feastGroup.add(mesh);
  }

  const tubePairs = [
    [0, 1], [0, 2], [0, 3], [0, 4], [1, 2], [2, 3], [3, 4],
  ];
  const tubePos = new Float32Array(tubePairs.length * 6);
  const tubeCol = new Float32Array(tubePairs.length * 6);
  let ti = 0;
  for (const [a, b] of tubePairs) {
    const ha = feastHubPos[a], hb = feastHubPos[b];
    color.setHex(STACK_COLORS[FEAST_HUB_ORDER[a]]);
    tubePos[ti] = ha[0]; tubePos[ti + 1] = ha[1]; tubePos[ti + 2] = ha[2];
    tubeCol[ti] = color.r * 0.4; tubeCol[ti + 1] = color.g * 0.4; tubeCol[ti + 2] = color.b * 0.4; ti += 3;
    color.setHex(STACK_COLORS[FEAST_HUB_ORDER[b]]);
    tubePos[ti] = hb[0]; tubePos[ti + 1] = hb[1]; tubePos[ti + 2] = hb[2];
    tubeCol[ti] = color.r * 0.65; tubeCol[ti + 1] = color.g * 0.65; tubeCol[ti + 2] = color.b * 0.65; ti += 3;
  }
  feastTubeGeom = new THREE.BufferGeometry();
  feastTubeGeom.setAttribute('position', new THREE.BufferAttribute(tubePos, 3));
  feastTubeGeom.setAttribute('color', new THREE.BufferAttribute(tubeCol, 3));
  feastTubeLines = new THREE.LineSegments(
    feastTubeGeom,
    new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.5 }),
  );
  feastGroup.add(feastTubeLines);

  const homes = data.base_positions || data.requests.map((_, i) => [0, 0, 0]);
  feastBodies = homes.map((p, i) => ({
    x: cx + (p[0] - cx) * 0.85,
    y: cy + (p[1] - cy) * 0.85,
    z: cz + (p[2] - cz) * 0.85,
    vx: 0, vy: 0, vz: 0,
    hx: cx + (p[0] - cx) * 0.85,
    hy: cy + (p[1] - cy) * 0.85,
    hz: cz + (p[2] - cz) * 0.85,
  }));

  const n = data.requests.length;
  feastSpringGeom = new THREE.BufferGeometry();
  feastSpringGeom.setAttribute(
    'position',
    new THREE.BufferAttribute(new Float32Array(Math.max(feastSprings.length, 1) * 6), 3).setUsage(THREE.DynamicDrawUsage),
  );
  feastSpringGeom.setAttribute(
    'color',
    new THREE.BufferAttribute(new Float32Array(Math.max(feastSprings.length, 1) * 6), 3).setUsage(THREE.DynamicDrawUsage),
  );
  feastSpringLines = new THREE.LineSegments(
    feastSpringGeom,
    new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.62 }),
  );
  feastGroup.add(feastSpringLines);

  feastMetricMeshes = createMetricInstancedLayers(feastGroup, n, layersForView('feast'), 0.009);
  feastGroup.position.set(0, 0, 0);

  feastBaseCamera = { tx: cx, ty: cy, tz: cz, px: cx + span * 0.55, py: cy + span * 0.48, pz: cz + span * 0.92 };
  controls.target.set(feastBaseCamera.tx, feastBaseCamera.ty, feastBaseCamera.tz);
  camera.position.set(feastBaseCamera.px, feastBaseCamera.py, feastBaseCamera.pz);
  lastFeastStep = performance.now();
}

function layoutFeastBodiesFromTrace(tMs, frame) {
  const pf = frame?.positions_flat;
  if (!pf) return;
  const ext = data.meta.extent;
  const cx = (ext[0] + ext[1]) / 2, cy = (ext[2] + ext[3]) / 2, cz = (ext[4] + ext[5]) / 2;
  const scale = 0.85;
  for (let i = 0; i < data.requests.length; i++) {
    const b = feastBodies[i];
    const life = requestLife(data.requests[i], tMs);
    if (life.phase === 'pending') {
      b.x = b.hx; b.y = b.hy; b.z = b.hz;
    } else {
      b.x = cx + (pf[i * 3] - cx) * scale;
      b.y = cy + (pf[i * 3 + 1] - cy) * scale;
      b.z = cz + (pf[i * 3 + 2] - cz) * scale;
    }
    b.vx = b.vy = b.vz = 0;
  }
}

function stepFeastPhysics(tMs, frame, dt) {
  if (!feastBodies.length) return;
  const chaos = feastChaos();
  const breath = frame?.breath ?? 1;
  const optimize = feastOptimize;
  const repulseK = (2.8 + 4.5 * chaos) * (0.75 + 0.35 * breath);
  const damp = 0.82 + 0.14 * optimize;
  const springK = 0.04 + 0.14 * (1 - chaos);
  const homeK = 0.02 + 0.12 * optimize;
  const hubK = 0.03 + 0.08 * optimize;
  const hubIdx = Object.fromEntries(FEAST_HUB_ORDER.map((id, i) => [id, i]));
  const active = [];

  for (let i = 0; i < data.requests.length; i++) {
    const life = requestLife(data.requests[i], tMs);
    const b = feastBodies[i];
    if (life.phase === 'active') active.push(i);
    else if (life.phase === 'pending') {
      b.vx *= 0.7; b.vy *= 0.7; b.vz *= 0.7;
      b.x += (b.hx - b.x) * 0.12;
      b.y += (b.hy - b.y) * 0.12;
      b.z += (b.hz - b.z) * 0.12;
      continue;
    } else {
      b.vx *= damp;
      b.vy *= damp;
      b.vz *= damp;
      b.x += (b.hx - b.x) * homeK * 2;
      b.y += (b.hy - b.y) * homeK * 2;
      b.z += (b.hz - b.z) * homeK * 2;
      continue;
    }

    let fx = (b.hx - b.x) * homeK;
    let fy = (b.hy - b.y) * homeK;
    let fz = (b.hz - b.z) * homeK;

    const hw = deriveHardware(data.requests[i]);
    for (const hid of FEAST_HUB_ORDER) {
      const hi = hubIdx[hid];
      const hp = feastHubPos[hi];
      const w = hw[hid] ?? 0.2;
      fx += (hp[0] - b.x) * hubK * w;
      fy += (hp[1] - b.y) * hubK * w;
      fz += (hp[2] - b.z) * hubK * w;
    }

    const jitter = chaos * 0.35 * breath * Math.sin(performance.now() * 0.008 + i * 0.7);
    fx += jitter;
    fy += Math.sin(performance.now() * 0.006 + i) * jitter * 0.6;
    fz += Math.cos(performance.now() * 0.005 + i * 1.1) * jitter * 0.5;

    b.vx = (b.vx + fx * dt * 60) * damp;
    b.vy = (b.vy + fy * dt * 60) * damp;
    b.vz = (b.vz + fz * dt * 60) * damp;
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    b.z += b.vz * dt * 60;
  }

  for (let ai = 0; ai < active.length; ai++) {
    for (let bi = ai + 1; bi < active.length; bi++) {
      const i = active[ai], j = active[bi];
      const a = feastBodies[i], c = feastBodies[j];
      let dx = a.x - c.x, dy = a.y - c.y, dz = a.z - c.z;
      let d2 = dx * dx + dy * dy + dz * dz + 0.002;
      const d = Math.sqrt(d2);
      const f = repulseK / d2;
      dx = (dx / d) * f; dy = (dy / d) * f; dz = (dz / d) * f;
      a.vx += dx; a.vy += dy; a.vz += dz;
      c.vx -= dx; c.vy -= dy; c.vz -= dz;
    }
  }

  const activeSet = new Set(active);
  for (const e of feastSprings) {
    if (!activeSet.has(e.u) && !activeSet.has(e.v)) continue;
    const a = feastBodies[e.u], c = feastBodies[e.v];
    let dx = c.x - a.x, dy = c.y - a.y, dz = c.z - a.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 1e-6;
    const rest = 0.12 + 0.22 * (1 - chaos);
    const k = springK * (e.type === 'cache' ? 1.35 : 0.9);
    const f = k * (dist - rest);
    dx = (dx / dist) * f; dy = (dy / dist) * f; dz = (dz / dist) * f;
    if (activeSet.has(e.u)) { a.vx += dx; a.vy += dy; a.vz += dz; }
    if (activeSet.has(e.v)) { c.vx -= dx; c.vy -= dy; c.vz -= dz; }
  }
}

function updateFeastHud(frame, activeCount) {
  const hud = document.getElementById('feastHud');
  const chaos = feastChaos();
  const contention = Math.min(100, Math.round(
    (activeCount / Math.max(data.requests.length * 0.08, 1)) * 45 * (0.5 + chaos) * (frame?.breath ?? 1),
  ));
  document.getElementById('feastContention').textContent = `${contention}%`;
  document.getElementById('feastTput').textContent = formatTput(dashDisplay.decode_tput || frame?.decode_tput || 0);
  document.getElementById('feastLat').textContent = formatMs(dashDisplay.latency_p50_ms || 0);
  document.getElementById('feastAlloc').textContent = feastOptimize >= 0.72 ? 'harmony' : feastOptimize >= 0.4 ? 'balancing' : 'chaos';
  hud.classList.toggle('chaos', chaos > 0.55);
  hud.classList.toggle('harmony', feastOptimize >= 0.72);
}

function updateFeast(frame) {
  if (!feastMetricMeshes.length || !feastBodies.length) return 0;
  const now = performance.now();
  const tMs = frame.tMs ?? 0;
  const chaos = feastChaos();
  const optimize = feastOptimize;
  const breath = frame.breath ?? 1;

  if (playing) {
    const dt = Math.min(0.05, (now - lastFeastStep) / 1000);
    lastFeastStep = now;
    stepFeastPhysics(tMs, frame, dt);
  } else {
    lastFeastStep = now;
    layoutFeastBodiesFromTrace(tMs, frame);
    feastCameraShake = 0;
    feastGroup.position.set(0, 0, 0);
  }

  let activeCount = 0;
  for (const req of data.requests) {
    if (requestLife(req, tMs).phase === 'active') activeCount++;
  }

  paintMetricInstances(feastMetricMeshes, {
    tMs,
    minSize: 0.22,
    maxSize: 2.4,
    span: spanFromExtent() * 2.2,
    animatePulse: playing,
    getPos: i => {
      const b = feastBodies[i];
      return [b.x, b.y, b.z];
    },
  });
  const feastLayers = feastMetricMeshes._layers || layersForView('feast');
  for (let mi = 0; mi < feastLayers.length; mi++) {
    const mesh = feastMetricMeshes[mi];
    if (!metricEnabled[feastLayers[mi].id]) continue;
    const cool = Math.max(0, (optimize - 0.35) / 0.65);
    mesh.material.emissiveIntensity = 0.42 + 0.28 * (1 - cool) + 0.18 * chaos;
    mesh.material.opacity = 0.82 + 0.12 * optimize;
  }

  const layerStress = frame.layer_stress || [1, 1, 1, 1, 1];
  for (let hi = 0; hi < feastHubMeshes.length; hi++) {
    const stress = layerStress[hi] ?? 1;
    const mesh = feastHubMeshes[hi];
    const hot = (0.85 + 0.45 * Math.min(stress, 2.2)) * (1 + 0.25 * chaos * breath);
    mesh.scale.setScalar(hot);
    mesh.material.emissiveIntensity = 0.25 + 0.45 * Math.min(stress, 2) + 0.25 * chaos;
    mesh.material.opacity = 0.88;
  }

  if (feastTubeLines) {
    const flicker = playing ? 0.5 + 0.5 * Math.sin(now * 0.009) : 1;
    feastTubeLines.material.opacity = Math.max(0.12, 0.2 + 0.5 * optimize - 0.22 * chaos * flicker);
  }

  const activeSet = new Set();
  for (let i = 0; i < data.requests.length; i++) {
    if (requestLife(data.requests[i], tMs).phase === 'active') activeSet.add(i);
  }
  const sp = feastSpringGeom.attributes.position;
  const sc = feastSpringGeom.attributes.color;
  let si = 0;
  for (const e of feastSprings) {
    if (!activeSet.has(e.u) && !activeSet.has(e.v)) continue;
    const a = feastBodies[e.u], c = feastBodies[e.v];
    const on = activeSet.has(e.u) && activeSet.has(e.v);
    const dim = on ? 0.75 + 0.2 * optimize : 0.28;
    const col = e.type === 'cache' ? [0.9, 0.55, 0.35] : [0.55, 0.75, 0.95];
    sp.setXYZ(si, a.x, a.y, a.z); sc.setXYZ(si, col[0] * dim, col[1] * dim, col[2] * dim); si++;
    sp.setXYZ(si, c.x, c.y, c.z); sc.setXYZ(si, col[0] * dim, col[1] * dim, col[2] * dim); si++;
  }
  feastSpringGeom.setDrawRange(0, si);
  sp.needsUpdate = true;
  sc.needsUpdate = true;

  if (playing && chaos > 0.35 && activeCount > 8) {
    feastCameraShake = Math.min(0.12, feastCameraShake + 0.02 * chaos * (activeCount / 40));
    const s = feastCameraShake * spanFromExtent();
    feastGroup.position.set(
      (Math.random() - 0.5) * s,
      (Math.random() - 0.5) * s * 0.7,
      (Math.random() - 0.5) * s,
    );
  } else {
    feastCameraShake = 0;
    feastGroup.position.set(0, 0, 0);
  }

  updateFeastHud(frame, activeCount);
  return activeCount;
}

function spanFromExtent() {
  const ext = data?.meta?.extent;
  if (!ext) return 1;
  return Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4], 0.5) * 0.04;
}

  const span = Math.max(ext[1] - ext[0], ext[3] - ext[2], ext[5] - ext[4]);
  controls.target.set(cx, cy, cz);
  camera.position.set(cx + span * 0.62, cy + span * 0.48, cz + span * 0.92);

function requestLife(req, tMs) {
  if (tMs < req.start_ms) return { phase: 'pending', progress: 0 };
  if (tMs > req.end_ms) return { phase: 'done', progress: 1 };
  return {
    phase: 'active',
    progress: (tMs - req.start_ms) / Math.max(req.end_ms - req.start_ms, 1e-6),
  };
}

function deriveHardware(req) {
  if (req.hardware) return req.hardware;
  const p = req.pipeline || { network: 0.25, storage: 0.25, cpu: 0.25, gpu: 0.25 };
  const blocks = Math.max(1, Math.ceil(req.input_length / 512));
  const cacheRatio = Math.min(1, (req.prefix_blocks || 1) / blocks);
  const raw = {
    network: p.network,
    storage: p.storage * (1 - cacheRatio * 0.65),
    kv_cache: p.storage * cacheRatio * 0.85 + p.cpu * 0.15,
    gpu: p.gpu * 0.62,
    hbm: p.gpu * 0.38 + Math.min(req.input_length / 120000, 0.2),
  };
  const total = STACK_ORDER.reduce((s, k) => s + raw[k], 0);
  return Object.fromEntries(STACK_ORDER.map(k => [k, raw[k] / Math.max(total, 1e-6)]));
}

function stackMotionMetric(req) {
  let sum = 0, cnt = 0;
  for (const layer of layersForView('stack')) {
    if (!metricEnabled[layer.id]) continue;
    sum += metricNorm(req, layer.id);
    cnt++;
  }
  return cnt ? sum / cnt : metricNorm(req, 'latency');
}

function sampleHardwareWindow(tMs) {
  const windows = data.hardware?.windows;
  if (!windows?.length) return null;
  if (tMs <= windows[0].t_ms) return { ...windows[0], tMs: windows[0].t_ms };
  for (let i = 1; i < windows.length; i++) {
    const w0 = windows[i - 1], w1 = windows[i];
    if (tMs <= w1.t_ms) {
      const u = (tMs - w0.t_ms) / Math.max(w1.t_ms - w0.t_ms, 1e-6);
      return {
        breath: lerp(w0.breath, w1.breath, u),
        active_requests: Math.round(lerp(w0.active_requests, w1.active_requests, u)),
        layer_stress: w0.layer_stress.map((v, j) => lerp(v, w1.layer_stress[j], u)),
        tMs,
      };
    }
  }
  const last = windows.at(-1);
  return { ...last, tMs: last.t_ms };
}

function stackLayerCenters() {
  return data.hardware?.layer_positions || [
    [0, 2.5, -0.8], [-1.7, 1.2, 1.1], [1.7, 1.2, 1.1], [0, 0, 0], [1.8, -0.35, -0.6],
  ];
}

function stackLayerPosition(req, layerIdx, reqIdx, tMs, frame) {
  const centers = stackLayerCenters();
  const layerId = STACK_ORDER[layerIdx];
  const center = centers[layerIdx];
  const hw = deriveHardware(req)[layerId] ?? 0.2;
  const maxIsl = data.meta.max_isl || 1;
  const maxTok = data.meta.max_tokens || 1;
  const baseline = data.meta.baseline_latency_ms || 1;
  const breath = frame.breath ?? 1;
  const motion = stackMotionMetric(req);
  const life = requestLife(req, tMs);
  const flowPhase = life.phase === 'active' ? life.progress : life.phase === 'done' ? 1 : 0;

  const sched = (req.start_ms / data.meta.duration_ms) * 2 - 1;
  const islNorm = req.input_length / maxIsl;
  const tokNorm = req.total_tokens / maxTok;
  const latNorm = Math.min(2.5, req.latency_ms / baseline);
  const spread = 0.52 * breath;

  const ox = sched * spread + 0.07 * Math.sin(reqIdx * 1.37 + layerIdx * 0.8);
  const oy = (latNorm - 0.8) * 0.18 * motion + 0.05 * Math.sin(reqIdx * 0.9 + layerIdx + tMs * 0.0004);
  const oz = islNorm * spread + tokNorm * 0.22 + 0.06 * Math.cos(reqIdx * 1.2);

  const pos = stackLayerPosCache[layerIdx];
  pos.set(center[0] + ox, center[1] + oy, center[2] + oz);

  if (layerIdx < STACK_ORDER.length - 1) {
    const next = centers[layerIdx + 1];
    tmpVec.set(next[0] - center[0], next[1] - center[1], next[2] - center[2]).normalize();
    pos.addScaledVector(tmpVec, flowPhase * hw * motion * 0.42);
  }
  return pos;
}
